name: CI

env:
  PACKAGE_ARTIFACT_PREFIX: ExcalidrawX

on:
  push:
    branches: [main, master]
    tags:
      - "*"
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Production build (webpack)
        run: npm run build

  package:
    if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            package_cmd: npm run package
            artifact_slug: linux-x64
          - os: windows-latest
            package_cmd: npm run package
            artifact_slug: win32-x64
          - os: macos-latest
            package_cmd: npm run package
            artifact_slug: darwin-arm64
          - os: macos-latest
            package_cmd: npm run package:x64
            artifact_slug: darwin-x64
            rust_target: x86_64-apple-darwin
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      # dtolnay only prepends $CARGO_HOME/bin when it installs rustup; runners that
      # already ship rustup (e.g. macOS + Homebrew) can leave another `cargo` first
      # on PATH, which may invoke rustup-init and break `cargo metadata` for Tauri.
      - name: Prefer rustup-managed Cargo on PATH
        shell: bash
        run: |
          cargo_home="${CARGO_HOME:-$HOME/.cargo}"
          echo "${cargo_home}/bin" >> "$GITHUB_PATH"

      - name: Add Rust target (macOS Intel cross-compile)
        if: ${{ matrix.rust_target != '' }}
        run: rustup target add ${{ matrix.rust_target }}

      - name: Install Linux system dependencies (Tauri / WebKitGTK)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Sanity-check Cargo resolves to rustup proxy
        shell: bash
        run: |
          set -euo pipefail
          command -v cargo
          cargo --version
          cargo metadata --format-version 1 --manifest-path src-tauri/Cargo.toml --no-deps > /dev/null

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installer(s) (Tauri)
        run: ${{ matrix.package_cmd }}

      # Only stage top-level installers. Uploading the full bundle tree duplicates
      # basenames (e.g. Info.plist, copyright, app) across platforms and breaks
      # softprops/action-gh-release (GitHub release assets require unique names).
      - name: Stage installers for artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist-upload
          find src-tauri/target -path '*/bundle/dmg/*' -name '*.dmg' -type f -exec cp -f {} dist-upload/ \;
          find src-tauri/target -path '*/bundle/nsis/*' -name '*.exe' -type f -exec cp -f {} dist-upload/ \;
          find src-tauri/target -path '*/bundle/msi/*' -name '*.msi' -type f -exec cp -f {} dist-upload/ \;
          find src-tauri/target -path '*/bundle/deb/*' -name '*.deb' -type f -exec cp -f {} dist-upload/ \;
          find src-tauri/target -path '*/bundle/rpm/*' -name '*.rpm' -type f -exec cp -f {} dist-upload/ \;
          find src-tauri/target -path '*/bundle/appimage/*' -name '*.AppImage' -type f -exec cp -f {} dist-upload/ \;
          echo "Staged installers:"
          ls -la dist-upload
          test "$(find dist-upload -mindepth 1 -maxdepth 1 -type f | wc -l | tr -d ' ')" -ge 1

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_ARTIFACT_PREFIX }}-${{ matrix.artifact_slug }}-${{ github.ref_name }}
          path: dist-upload
          if-no-files-found: error

  release:
    if: github.ref_type == 'tag'
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: ${{ env.PACKAGE_ARTIFACT_PREFIX }}-*
          merge-multiple: true

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Excalidraw X ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/**/*.dmg
            release-assets/**/*.exe
            release-assets/**/*.msi
            release-assets/**/*.deb
            release-assets/**/*.rpm
            release-assets/**/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
