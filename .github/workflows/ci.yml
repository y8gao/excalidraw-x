name: CI

# Must match `packagerConfig.name` in forge.config.js (Forge ZIP / app bundle name).
env:
  PACKAGE_ARTIFACT_PREFIX: ExcalidrawX

on:
  push:
    branches: [main, master]
    tags:
      - "*"
  pull_request:
    branches: [main, master]
  # Actions → CI → Run workflow：手动跑完整 Forge 矩阵（ZIP + Windows MSI），不打 tag。
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Production build
        run: npm run build

  package:
    if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            make_cmd: npm run make
            artifact_slug: linux-x64
          - os: windows-latest
            make_cmd: npm run make
            artifact_slug: win32-x64
          # Apple Silicon (host arch on macos-latest)
          - os: macos-latest
            make_cmd: npm run make
            artifact_slug: darwin-arm64
          # Intel Mac — Forge targets x64 from the arm64 runner
          - os: macos-latest
            make_cmd: npm run make:mac-x64
            artifact_slug: darwin-x64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Make distributables (ZIP)
        run: ${{ matrix.make_cmd }}

      # Locator lives at .github/scripts/ci-locate-forge-zip.js (Node, not bash — macOS bash 3.2; Windows shell differs).
      - name: Locate Forge-built ZIP
        id: forge_zip
        env:
          ZIP_PREFIX: ${{ env.PACKAGE_ARTIFACT_PREFIX }}
        run: node .github/scripts/ci-locate-forge-zip.js

      - name: Canonicalize ZIP filename for release
        id: release_zip
        env:
          FORGE_ZIP_PATH: ${{ steps.forge_zip.outputs.path }}
          ARTIFACT_SLUG: ${{ matrix.artifact_slug }}
          ZIP_PREFIX: ${{ env.PACKAGE_ARTIFACT_PREFIX }}
        run: node .github/scripts/ci-canonicalize-zip.js

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.release_zip.outputs.stem }}
          path: ${{ steps.release_zip.outputs.path }}
          if-no-files-found: error

      - name: Locate Forge-built MSI (Windows)
        if: runner.os == 'Windows'
        id: forge_msi
        env:
          MSI_PREFIX: ${{ env.PACKAGE_ARTIFACT_PREFIX }}
        run: node .github/scripts/ci-locate-forge-msi.js

      - name: Upload MSI installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.forge_msi.outputs.stem }}
          path: ${{ steps.forge_msi.outputs.path }}
          if-no-files-found: error

  # Attach ZIPs from all matrix legs to a GitHub Release for the tag (public download).
  release:
    if: github.ref_type == 'tag'
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          # Matches upload-artifact `name` from canonicalize step: ExcalidrawX-<platform>-<version>.
          pattern: ${{ env.PACKAGE_ARTIFACT_PREFIX }}-*
          merge-multiple: true

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Excalidraw X ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/**/*.zip
            release-assets/**/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
