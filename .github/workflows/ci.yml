name: CI

env:
  PACKAGE_ARTIFACT_PREFIX: ExcalidrawX

on:
  push:
    branches: [main, master]
    tags:
      - "*"
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Production build (webpack)
        run: npm run build

  package:
    if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            package_cmd: npm run package
            artifact_slug: linux-x64
          - os: windows-latest
            package_cmd: npm run package
            artifact_slug: win32-x64
          - os: macos-latest
            package_cmd: npm run package
            artifact_slug: darwin-arm64
          - os: macos-latest
            package_cmd: npm run package:x64
            artifact_slug: darwin-x64
            rust_target: x86_64-apple-darwin
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target (macOS Intel cross-compile)
        if: ${{ matrix.rust_target != '' }}
        run: rustup target add ${{ matrix.rust_target }}

      - name: Install Linux system dependencies (Tauri / WebKitGTK)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installer(s) (Tauri)
        run: ${{ matrix.package_cmd }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_ARTIFACT_PREFIX }}-${{ matrix.artifact_slug }}-${{ github.ref_name }}
          path: src-tauri/target/*/bundle/**/*
          if-no-files-found: error

  release:
    if: github.ref_type == 'tag'
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: ${{ env.PACKAGE_ARTIFACT_PREFIX }}-*
          merge-multiple: true

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Excalidraw X ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
