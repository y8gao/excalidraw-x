name: CI

# Must match `packagerConfig.name` in forge.config.js (Forge ZIP / app bundle name).
env:
  PACKAGE_ARTIFACT_PREFIX: ExcalidrawX

on:
  push:
    branches: [main, master]
    tags:
      - "*"
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Production build
        run: npm run build

  package:
    if: github.ref_type == 'tag'
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            make_cmd: npm run make
          - os: windows-latest
            make_cmd: npm run make
          # Apple Silicon (host arch on macos-latest)
          - os: macos-latest
            make_cmd: npm run make
          # Intel Mac — Forge targets x64 from the arm64 runner
          - os: macos-latest
            make_cmd: npm run make:mac-x64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Make distributables (ZIP)
        run: ${{ matrix.make_cmd }}

      # Locator lives at .github/scripts/ci-locate-forge-zip.js (Node, not bash — macOS bash 3.2; Windows shell differs).
      - name: Locate Forge-built ZIP
        id: forge_zip
        env:
          ZIP_PREFIX: ${{ env.PACKAGE_ARTIFACT_PREFIX }}
        run: node .github/scripts/ci-locate-forge-zip.js

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.forge_zip.outputs.stem }}
          path: ${{ steps.forge_zip.outputs.path }}
          if-no-files-found: error

  # Attach ZIPs from all matrix legs to a GitHub Release for the tag (public download).
  release:
    if: github.ref_type == 'tag'
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          # Same stem as Forge ZIPs (version from package.json at tag), not the git tag string.
          pattern: ${{ env.PACKAGE_ARTIFACT_PREFIX }}-*
          merge-multiple: true

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Excalidraw X ${{ github.ref_name }}
          generate_release_notes: true
          files: release-assets/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
